x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DJANGO_ENV: production
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: "False"
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: db
  DB_PORT: ${DB_PORT:-5432}
  REDIS_URL: ${REDIS_URL}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_PORT: ${EMAIL_PORT}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  STATIC_ROOT: ${STATIC_ROOT}
  MEDIA_ROOT: ${MEDIA_ROOT}
  LOG_FILE: ${LOG_FILE:-/app/logs/django.log}
  ERROR_LOG_FILE: ${ERROR_LOG_FILE:-/app/logs/error.log}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - talentzik_dokploy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - talentzik_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - talentzik_dokploy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - talentzik_internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: /app/scripts/run.sh
    environment:
      <<: *django-env
    expose:
      - "8000"
    volumes:
      - talentzik_dokploy_static_data:/app/staticfiles
      - talentzik_dokploy_media_data:/app/media
      - talentzik_dokploy_logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentzik_internal

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      <<: *django-env
    volumes:
      - talentzik_dokploy_media_data:/app/media
      - talentzik_dokploy_logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentzik_internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./proxy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - talentzik_dokploy_static_data:/app/staticfiles:ro
      - talentzik_dokploy_media_data:/app/media:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      web:
        condition: service_started
    networks:
      - talentzik_internal
      - dokploy-network

volumes:
  talentzik_dokploy_postgres_data:
    name: talentzik_dokploy_postgres_data
  talentzik_dokploy_redis_data:
    name: talentzik_dokploy_redis_data
  talentzik_dokploy_static_data:
    name: talentzik_dokploy_static_data
  talentzik_dokploy_media_data:
    name: talentzik_dokploy_media_data
  talentzik_dokploy_logs_data:
    name: talentzik_dokploy_logs_data

networks:
  talentzik_internal:
    driver: bridge
  dokploy-network:
    external: true
